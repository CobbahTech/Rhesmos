<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhesmos</title>
  <link rel="stylesheet" href="intro.css">
</head>
<body class="intro-active">
  <div id="intro-screen">
    <div class="intro-content">
      <!-- Logo -->
      <img src="images/Rhesmos.png" alt="Rhesmos Logo" class="logo">
 
      <!-- Main heading -->
      <h1>Rhesmos</h1>
 
      <!-- Description -->
      <p>
        Rhesmos is a safe, anonymous space where you can say what you can't say anywhere else.<br>
        No names. No faces. Just posts.
      </p>
 
      <p class="warning">
        But remember, freedom comes with responsibility.<br>
        Think before you post.
      </p>
 
      <!-- Buttons -->
      <div class="intro-buttons">
        <button id="enter-btn">Enter Rhesmos</button>
        <button id="leave-btn">Leave</button>
      </div>
    </div>
  </div>
 
  <script src="intro.js"></script>
</body>
</html>
