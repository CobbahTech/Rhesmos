<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spill</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Skeleton wrapper ── */
    #skeleton-feed {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px 16px 0;
    }
 
    /* ── Skeleton card ── */
    .skeleton-card {
      background: #12171e;
      border-radius: 14px;
      margin-bottom: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
 
    @media (max-width: 480px) {
      #skeleton-feed { padding: 12px 12px 0; }
    }
 
    .skeleton-line {
      background: linear-gradient(90deg, #1a2030 25%, #252f42 50%, #1a2030 75%);
      background-size: 400% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
      border-radius: 4px;
      flex-shrink: 0;
    }
 
    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
 
    /* Header: avatar | username ............. time */
    .skeleton-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
    }
    .skeleton-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
    }
    .skeleton-name {
      height: 12px; width: 120px;
    }
    .skeleton-time {
      height: 10px; width: 50px;
      margin-left: auto;
    }
 
    /* Full-width image block — no side padding, like real posts */
    .skeleton-image {
      width: 100%; height: 220px;
      border-radius: 0;
      display: block;
    }
 
    /* Text body for text-only posts */
    .skeleton-body {
      padding: 2px 16px 10px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .skeleton-text-long { height: 13px; width: 90%; }
    .skeleton-text-mid  { height: 13px; width: 62%; }
 
    /* Actions: 💙 on left, 💬 on right */
    .skeleton-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 14px;
    }
    .skeleton-react {
      height: 18px; width: 40px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
 
  <!-- Header -->
  <header class="header">
    <div class="avatar">
      <img id="user-avatar" src="" alt="Avatar">
      <span id="username"></span>
    </div>
    <button id="spill-button">Spill Something</button>
    <button id="theme-toggle">🌙</button>
  </header>
 
  <!-- Spill Modal -->
  <div id="spill-modal" class="modal">
    <div class="modal-content">
      <h3>What do you want to spill?</h3>
      <textarea id="spill-text" placeholder="Type something..."></textarea>
      <input type="file" id="media-input" accept="image/*,video/*">
      <div class="modal-actions">
        <button id="post-btn">Post</button>
        <button id="close-btn">Cancel</button>
      </div>
    </div>
  </div>
 
  <!-- Categories -->
  <div class="categories">
    <button class="active"       onclick="window.location.href='spill.html'">All</button>
    <button onclick="window.location.href='funny.html'">Funny</button>
    <button onclick="window.location.href='anime.html'">Anime</button>
    <button onclick="window.location.href='rant.html'">Rant</button>
    <button onclick="window.location.href='advice.html'">Advice</button>
    <button onclick="window.location.href='highschool.html'">HighSchool</button>
    <button onclick="window.location.href='teenvibes.html'">TeenVibes</button>
    <button onclick="window.location.href='adult.html'">Adult</button>
    <button onclick="window.location.href='sports.html'">Sports</button>
    <button onclick="window.location.href='politics.html'">Politics</button>
    <button onclick="window.location.href='gaming.html'">Gaming</button>
    <button onclick="window.location.href='memes.html'">Memes</button>
    <button onclick="window.location.href='weapons.html'">Weapons</button>
    <button onclick="window.location.href='religion.html'">Religion</button>
  </div>
 
  <!-- Skeleton Screen -->
  <div id="skeleton-feed">
 
    <!-- Card 1: image post -->
    <div class="skeleton-card">
      <div class="skeleton-header">
        <div class="skeleton-line skeleton-avatar"></div>
        <div class="skeleton-line skeleton-name"></div>
        <div class="skeleton-line skeleton-time"></div>
      </div>
      <div class="skeleton-line skeleton-image"></div>
      <div class="skeleton-actions">
        <div class="skeleton-line skeleton-react"></div>
        <div class="skeleton-line skeleton-react"></div>
      </div>
    </div>
 
    <!-- Card 2: text post -->
    <div class="skeleton-card">
      <div class="skeleton-header">
        <div class="skeleton-line skeleton-avatar"></div>
        <div class="skeleton-line skeleton-name"></div>
        <div class="skeleton-line skeleton-time"></div>
      </div>
      <div class="skeleton-body">
        <div class="skeleton-line skeleton-text-long"></div>
        <div class="skeleton-line skeleton-text-mid"></div>
      </div>
      <div class="skeleton-actions">
        <div class="skeleton-line skeleton-react"></div>
        <div class="skeleton-line skeleton-react"></div>
      </div>
    </div>
 
    <!-- Card 3: image post -->
    <div class="skeleton-card">
      <div class="skeleton-header">
        <div class="skeleton-line skeleton-avatar"></div>
        <div class="skeleton-line skeleton-name"></div>
        <div class="skeleton-line skeleton-time"></div>
      </div>
      <div class="skeleton-line skeleton-image"></div>
      <div class="skeleton-actions">
        <div class="skeleton-line skeleton-react"></div>
        <div class="skeleton-line skeleton-react"></div>
      </div>
    </div>
 
  </div>
 
  <!-- Real Feed (hidden until posts load) -->
  <main class="feed" id="feed" style="display:none;"></main>
 
  <!-- User Setup -->
  <script>
    const adjectives = ["Silent", "Crazy", "Happy", "Blue", "Electric"];
    const nouns      = ["Penguin", "Tiger", "Banana", "Rocket", "Wizard"];
 
    let username = localStorage.getItem("spillUsername");
    if (!username) {
      const randomNumber = Math.floor(Math.random() * 100);
      username =
        adjectives[Math.floor(Math.random() * adjectives.length)] +
        nouns[Math.floor(Math.random() * nouns.length)] +
        randomNumber;
      localStorage.setItem("spillUsername", username);
    }
 
    const usernameElem = document.getElementById("username");
    if (usernameElem) usernameElem.textContent = username;
 
    const avatarElem = document.getElementById("user-avatar");
    if (avatarElem) {
      let userAvatar = localStorage.getItem("spillAvatar");
      if (!userAvatar) {
        userAvatar = `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(username)}`;
        localStorage.setItem("spillAvatar", userAvatar);
      }
      avatarElem.src = userAvatar;
    }
 
    window.hideSkeleton = function () {
      const skeleton = document.getElementById("skeleton-feed");
      const feed     = document.getElementById("feed");
      if (skeleton) skeleton.style.display = "none";
      if (feed)     feed.style.display     = "";
    };
  </script>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <script src="script.js"></script>
 
</body>
</html>
